<!DOCTYPE html>
<html lang="id">
<head>

  <title>3D Tic Tac Toe — Grafika Komputer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ══════════════ HEADER ══════════════ -->
  <header id="header">

    <div id="logo">TIC<span>·</span>TAC<span>·</span>TOE <span style="font-size:.55rem;opacity:.5">3D</span></div>

    <div id="status-wrap">
      <div id="turn-label">current player</div>
      <div id="status-msg" class="x">PLAYER X'S TURN</div>
    </div>

    <div id="scores">
      <span class="chip chip-x"    id="score-x">X  0</span>
      <span class="chip chip-draw" id="score-d">D  0</span>
      <span class="chip chip-o"    id="score-o">O  0</span>
    </div>

  </header>

  <!-- ══════════════ CANVAS ══════════════ -->
  <div id="canvas-wrap">

    <canvas id="game-canvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="load-msg">INITIALIZING…</div>
      <div id="prog-track"><div id="prog-fill"></div></div>
    </div>

    <!-- Win flash overlay -->
    <div id="win-flash">
      <div id="win-banner">PLAYER X WINS!</div>
    </div>

  </div>

  <!-- ══════════════ FOOTER ══════════════ -->
  <footer id="footer">

    <button class="btn btn-c" id="btn-restart">⟳ Restart Game</button>
    <button class="btn btn-m" id="btn-cam">◎ Camera</button>
    <button class="btn btn-g" id="btn-music" onclick="window._toggleMusic && window._toggleMusic()">♫ Music OFF</button>

    <div id="hints">
      <span><kbd>Click</kbd> Place piece</span>
      <span><kbd>R</kbd> Restart</span>
      <span><kbd>C</kbd> Camera</span>
      <span><kbd>Space</kbd> Colors</span>
      <span><kbd>M</kbd> Music</span>
      <span><kbd>Drag</kbd> Orbit</span>
      <span><kbd>Scroll</kbd> Zoom</span>
    </div>

  </footer>

</div><!-- /#app -->
  
<script src="js/main.js"></script>
</body>
</html>
